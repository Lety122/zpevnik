<!DOCTYPE html>

    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b2021">

    <style>
      body {
        background-color: #1b2021;
        font-family: 'Courier New', monospace;
        color: #CFC7D2;
      }
      h1 {
        color: #CFC7D2;
        margin-top: 20px;
        white-space: nowrap;
      }
      .yellow {
        color: #FEB12C;
      }
      .green {
        color: #59C9A5;
      }
      div {
        margin-left: 20px;
        margin-right: 20px;
      }
      
      /* Úprava vyhledávacího pole */
      #search-container {
        margin-left: 0px;
        margin-bottom: 30px;
      }
      input[type="text"] {
        background-color: #1b2021;
        color: #FEB12C;
        border: 2px solid #CFC7D2;
        padding: 12px;
        font-family: 'Courier New', monospace;
        font-size: 18px;
        width: 100%;
        max-width: 500px;
        border-radius: 4px;
        box-sizing: border-box;
      }
      input[type="text"]:focus {
        outline: none;
        border-color: #FEB12C;
      }
      input[type="text"]::placeholder {
        color: #CFC7D2;
        opacity: 0.6;
      }

      /* Stylování seznamu výsledků */
      ul {
        list-style-type: none;
        padding: 0;
      }
      li {
        margin-bottom: 15px;
      }
      a {
        color: #CFC7D2;
        text-decoration: none;
        font-size: 20px;
        font-weight: bold;
        transition: color 0.2s;
      }
      a:hover {
        color: #FEB12C;
      }
      a::before {
        content: "> ";
        color: #FEB12C;
      }
      .not-found {
        color: #FEB12C;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div>

      const searchInput = document.getElementById('searchInput');
      const songList = document.getElementById('songList');

      // Funkce pro odstranění diakritiky (aby "tri krize" našlo "Tři kříže")
      function removeDiacritics(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      }

      // Funkce pro vykreslení seznamu
      function renderList(query = '') {
        songList.innerHTML = ''; // Vyprázdnění seznamu
        
        const normalizedQuery = removeDiacritics(query.toLowerCase());

        // Filtrace písní podle hledaného textu
        const filteredSongs = songs.filter(song => {
          const normalizedTitle = removeDiacritics(song.title.toLowerCase());
          return normalizedTitle.includes(normalizedQuery);
        });

        // Co dělat, když nic nenajdeme
        if (filteredSongs.length === 0) {
          const li = document.createElement('li');
          li.textContent = "Žádná píseň neodpovídá hledání...";
          li.className = "not-found";
          songList.appendChild(li);
          return;
        }

        // Vykreslení nalezených písní
        filteredSongs.forEach(song => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = song.path;
          a.textContent = song.title;
          li.appendChild(a);
          songList.appendChild(li);
        });
      }

      // Naslouchání změnám v textovém poli (hledání probíhá okamžitě při psaní)
      searchInput.addEventListener('input', (e) => {
        renderList(e.target.value);
      });

      // Vykreslení všech písní při prvním načtení stránky
      renderList();
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/zpevnik/sw.js')
        .then(registration => {
          console.log('Service Worker byl úspěšně zaregistrován.');
        })
        .catch(err => {
          console.log('Registrace Service Workeru selhala: ', err);
        });
    });
  }
</script>
<script>
  let deferredPrompt;
  const installAppBtn = document.getElementById('installAppBtn');

  // Posloucháme, jestli prohlížeč povolí instalaci (funguje na Android/PC, ne na iOS)
  window.addEventListener('beforeinstallprompt', (e) => {
    // Zabráníme prohlížeči ukázat jeho vlastní (často nenápadný) banner
    e.preventDefault();
    // Uložíme si událost na později
    deferredPrompt = e;
    // Zobrazíme naše vlastní zelené tlačítko
    installAppBtn.style.display = 'block';
  });

  // Co se stane po kliknutí na naše tlačítko
  installAppBtn.addEventListener('click', async () => {
    if (deferredPrompt !== null) {
      // Vyvoláme nativní systémový dialog pro instalaci
      deferredPrompt.prompt();
      
      // Počkáme, jak se uživatel rozhodne
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        console.log('Uživatel aplikaci nainstaloval');
        // Schováme tlačítko, už není potřeba
        installAppBtn.style.display = 'none';
      }
      
      // Událost lze použít jen jednou, takže ji vymažeme
      deferredPrompt = null;
    }
  });

  // Pokud uživatel aplikaci nainstaluje jiným způsobem, tlačítko schováme
  window.addEventListener('appinstalled', () => {
    installAppBtn.style.display = 'none';
    deferredPrompt = null;
    console.log('PWA byla nainstalována');
  });
</script>
  </body>
</html>
