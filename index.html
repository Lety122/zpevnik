<!DOCTYPE html>
<html lang="cs">
  <head>
    <title>Zpěvník - Vyhledávání</title>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b2021">
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=0.8">
    <style>
      html {
        background-color: #1b2021;
      }
      body {
        background-color: #1b2021;
        font-family: 'Courier New', monospace;
        color: #CFC7D2;
        min-height: 100vh;
      }
      h1 {
        color: #CFC7D2;
        margin-top: 20px;
      }
      .yellow {
        color: #FEB12C;
      }
      .green {
        color: #59C9A5;
      }
      div {
        margin-left: 20px;
        margin-right: 20px;
      }
      
      /* Úprava vyhledávacího pole */
      #search-container {
        margin-left: 0px;
        margin-bottom: 30px;
      }
      #searchInput {
        background-color: #1b2021;
        color: #FEB12C;
        border: 2px solid #CFC7D2;
        padding: 12px;
        font-family: 'Courier New', monospace;
        font-size: 18px;
        width: 100%;
        max-width: 500px;
        border-radius: 4px;
        box-sizing: border-box;
      }
      #searchInput:focus {
        outline: none;
        border-color: #FEB12C;
      }
      #searchInput::placeholder {
        color: #CFC7D2;
        opacity: 0.6;
      }

      /* Stylování seznamu výsledků */
      ul {
        list-style-type: none;
        padding: 0;
      }
      li {
        margin-bottom: 15px;
      }
      a {
        color: #CFC7D2;
        text-decoration: none;
        font-size: 20px;
        font-weight: bold;
        transition: color 0.2s;
      }
      a:hover {
        color: #FEB12C;
      }
      a::before {
        content: "> ";
        color: #FEB12C;
      }
      .not-found {
        color: #FEB12C;
        font-style: italic;
      }
      /* Odkaz na táborovou tabulku (Google Sheets) */
      .camp-link {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        margin: 48px 0 28px;
        padding: 11px 18px 11px 11px;
        background: #0F9D58;
        border-radius: 10px;
        color: #fff;
        font-family: 'Courier New', monospace;
        font-weight: bold;
        font-size: 18px;
        text-decoration: none;
        box-shadow: 0 2px 8px rgba(0,0,0,.35);
        transition: background .2s;
      }
      .camp-link:hover { background: #0c8043; color: #fff; }
      .camp-link::before { content: none; }
      .camp-link .gs {
        flex: none;
        width: 34px;
        height: 34px;
        background: #fff;
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>

  [+] Nainstalovat jako aplikaci
</button>

  Pro instalaci na iPhone/iPad: Sdílet → „Přidat na plochu“
</p>

      <ul id="songList"></ul>

            <path fill="#0B8043" d="M30 3v8a3 3 0 0 0 3 3h7L30 3z"/>
            <rect x="15" y="22" width="18" height="13" rx="1.4" fill="#fff"/>

      const searchInput = document.getElementById('searchInput');
      const songList = document.getElementById('songList');

      // Funkce pro odstranění diakritiky (aby "tri krize" našlo "Tři kříže")
      function removeDiacritics(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
      }

      // Funkce pro vykreslení seznamu
      function renderList(query = '') {
        songList.innerHTML = ''; // Vyprázdnění seznamu
        
        const normalizedQuery = removeDiacritics(query.toLowerCase());

        // Filtrace písní podle hledaného textu
        const filteredSongs = songs.filter(song => {
          const normalizedTitle = removeDiacritics(song.title.toLowerCase());
          return normalizedTitle.includes(normalizedQuery);
        });

        // Co dělat, když nic nenajdeme
        if (filteredSongs.length === 0) {
          const li = document.createElement('li');
          li.textContent = "Žádná píseň neodpovídá hledání...";
          li.className = "not-found";
          songList.appendChild(li);
          return;
        }

        // Vykreslení nalezených písní
        filteredSongs.forEach(song => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = song.path;
          a.textContent = song.title;
          li.appendChild(a);
          songList.appendChild(li);
        });
      }

      // Naslouchání změnám v textovém poli (hledání probíhá okamžitě při psaní)
      searchInput.addEventListener('input', (e) => {
        renderList(e.target.value);
      });

      // Vykreslení všech písní při prvním načtení stránky
      renderList();
    </script>
    <script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/sw.js')
        .then(registration => {
          console.log('Service Worker byl úspěšně zaregistrován.');
        })
        .catch(err => {
          console.log('Registrace Service Workeru selhala: ', err);
        });
    });
  }
</script>
<script>
  let deferredPrompt;
  const installAppBtn = document.getElementById('installAppBtn');

  // Posloucháme, jestli prohlížeč povolí instalaci (funguje na Android/PC, ne na iOS)
  window.addEventListener('beforeinstallprompt', (e) => {
    // Zabráníme prohlížeči ukázat jeho vlastní (často nenápadný) banner
    e.preventDefault();
    // Uložíme si událost na později
    deferredPrompt = e;
    // Zobrazíme naše vlastní zelené tlačítko
    installAppBtn.style.display = 'block';
  });

  // Co se stane po kliknutí na naše tlačítko
  installAppBtn.addEventListener('click', async () => {
    if (deferredPrompt !== null) {
      // Vyvoláme nativní systémový dialog pro instalaci
      deferredPrompt.prompt();
      
      // Počkáme, jak se uživatel rozhodne
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') {
        console.log('Uživatel aplikaci nainstaloval');
        // Schováme tlačítko, už není potřeba
        installAppBtn.style.display = 'none';
      }
      
      // Událost lze použít jen jednou, takže ji vymažeme
      deferredPrompt = null;
    }
  });

  // Pokud uživatel aplikaci nainstaluje jiným způsobem, tlačítko schováme
  window.addEventListener('appinstalled', () => {
    installAppBtn.style.display = 'none';
    deferredPrompt = null;
    console.log('PWA byla nainstalována');
  });

  // Na iOS beforeinstallprompt nefunguje — ukážeme návod, pokud appka ještě neběží z plochy
  const jeIos = /iphone|ipad|ipod/i.test(navigator.userAgent)
    || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1); // iPad se hlásí jako Mac
  const beziJakoAplikace = window.matchMedia('(display-mode: standalone)').matches
    || window.navigator.standalone === true;
  if (jeIos && !beziJakoAplikace) {
    document.getElementById('iosInstallHint').style.display = 'block';
  }
</script>
