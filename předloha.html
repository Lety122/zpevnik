<!DOCTYPE html>
<html lang="cs">
  <head>
    <title>Template</title>
    <meta charset="utf-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <style>
      body {
        background-color: #1b2021;
        font-family: 'Courier New', monospace;
      }
      pre {
        color: #CFC7D2;
        font-size: 16px;
        display: inline;
      }
      h1 {
        color: #CFC7D2;
        margin-top: 20px;
        white-space: nowrap;
      }
      .yellow {
        color: #FEB12C;
      }
      .green {
        color: #59C9A5;
      }
      div {
        margin-left: 20px;
        margin-right: 20px;
      }
      iframe {
        margin-left: 20px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div>
    <h1><b>Template <pre style="font-size: 30px;" class="yellow">ending</pre></b></h1>
    <p><b><pre class="yellow" style="font-size: 20px;">Autor</pre></b></p>
    <br>
  </div>
<div>
<pre>
<pre class="yellow">
Akordy</pre>
Velmi inteligentní text
</div>
    
  <script>
  // Drží rozsvícenou obrazovku, dokud je píseň otevřená (hraní podle textu)
  if ('wakeLock' in navigator) {
    let zamek = null;
    const obnovZamek = () => {
      navigator.wakeLock.request('screen')
        .then(z => { zamek = z; })
        .catch(() => {});
    };
    obnovZamek();
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') obnovZamek();
    });
  }
</script>
  </body>
</html>
